# Hyprland window rules for the floating sugarrush terminal.
# The Waybar on-click launches: foot -a sugarrush-float sugarrush
# so the window carries app-id "sugarrush-float". Add these to hyprland.conf.

windowrulev2 = float, class:^(sugarrush-float)$
windowrulev2 = size 960 640, class:^(sugarrush-float)$
windowrulev2 = center, class:^(sugarrush-float)$
