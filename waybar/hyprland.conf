# Hyprland window rules for the floating sugarrush terminal.
# The Waybar on-click launches: foot -a sugarrush-float sugarrush
# so the window carries app-id "sugarrush-float". Add these to hyprland.conf.
#
# Uses the current `windowrule` syntax. On Hyprland older than ~0.42,
# replace `windowrule` with the deprecated `windowrulev2`.

windowrule = float, class:^(sugarrush-float)$
windowrule = size 960 640, class:^(sugarrush-float)$
windowrule = center, class:^(sugarrush-float)$
