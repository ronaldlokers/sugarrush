name: Publish to AUR

# Push sugarrush-bin to the AUR once release binaries exist. Triggered after
# the dist "Release" workflow finishes (the release assets are then present),
# or manually via workflow_dispatch for a given tag. No-ops until the
# AUR_SSH_KEY secret is set.
#
# Note: `on: release` doesn't fire for releases created by the default
# GITHUB_TOKEN, which is why this keys off the Release workflow instead.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v2026.7.1)"
        required: true

permissions:
  contents: read

jobs:
  aur:
    # On workflow_run only proceed if the release actually produced artifacts
    # (host job succeeded); manual dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/checkout@v4

      - name: Check inputs
        id: gate
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "AUR_SSH_KEY not set — skipping AUR publish."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$TAG" in
            v[0-9]*) echo "ready=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "not a version tag: '$TAG' — skipping."; echo "ready=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Wait for release asset
        if: steps.gate.outputs.ready == 'true'
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          url="https://github.com/ronaldlokers/sugarrush/releases/download/v${ver}/sugarrush-x86_64-unknown-linux-musl.tar.xz"
          for i in $(seq 1 30); do
            if curl -fsSL -o /tmp/sr.tar.xz "$url"; then echo "got asset"; exit 0; fi
            echo "waiting for release asset ($i)…"; sleep 10
          done
          echo "release asset not found: $url"; exit 1

      - name: Render PKGBUILD
        if: steps.gate.outputs.ready == 'true'
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          sha="$(sha256sum /tmp/sr.tar.xz | cut -d' ' -f1)"
          sed -e "s/@VERSION@/${ver}/" -e "s/@SHA256@/${sha}/" \
            packaging/aur/PKGBUILD.in > packaging/aur/PKGBUILD
          echo "----- PKGBUILD -----"; cat packaging/aur/PKGBUILD

      - name: Publish
        if: steps.gate.outputs.ready == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: sugarrush-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: ronaldlokers
          commit_email: ronald@lokers.email
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ env.TAG }}"
          updpkgsums: false
