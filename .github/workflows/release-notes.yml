name: Normalize release notes

# cargo-dist titles the GitHub Release from the changelog heading (with the
# date) and appends Install / Download sections to the body. This rewrites it to
# the house format once the Release exists: the title is the bare version, and
# the body is just this version's CHANGELOG section under "## Release Notes".
#
# Keyed off the Release workflow completing (like aur.yml) because releases
# created by GITHUB_TOKEN don't fire the `release` event. Can also be re-run
# manually for a tag.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to normalize (e.g. v2026.7.3)"
        required: true

permissions:
  contents: write

jobs:
  normalize:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.event.workflow_run.head_branch }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite title + body to house format
        run: |
          set -euo pipefail
          case "$TAG" in
            v[0-9]*) : ;;
            *) echo "not a version tag: '$TAG' — skipping."; exit 0 ;;
          esac
          ver="${TAG#v}"

          # Extract this version's CHANGELOG section (between its heading and the
          # next version heading).
          section="$(awk -v v="$ver" '
            index($0, "## [" v "]") == 1 { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md)"

          if [ -z "${section//[[:space:]]/}" ]; then
            echo "no CHANGELOG section for $ver — leaving release as-is."
            exit 0
          fi

          # Trim leading/trailing blank lines, then wrap under a Release Notes heading.
          section="$(printf '%s\n' "$section" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')"
          printf '## Release Notes\n\n%s\n' "$section" > notes.md

          echo "----- notes.md -----"; cat notes.md
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$ver" --notes-file notes.md
